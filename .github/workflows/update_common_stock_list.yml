name: Update Common Stock List

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 12 * * 6"   # 12:00 UTC every Saturday (markets closed, quiet time)

permissions:
  contents: write

jobs:
  update-common-stock-list:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run export
        run: python export_universe.py
      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nasdaq_nyse_common_stock.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update common stock list: $(date -u +%Y-%m-%d)"
            git push
          fi
